name: Deploy Pages

# Deploys the contents of this repo's main branch to GitHub Pages as-is.
# This repo is the PUBLIC Pages host for the Risk of Ragnarok patcher; its
# content is assembled and pushed here by the PRIVATE risk-of-ragnarok-patcher
# repo's tooling (see that repo's docs/release-process.md). Do not hand-edit
# patch files here; edit in the private repo and let it publish.

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site (exclude repo meta)
        run: |
          set -e
          mkdir _site
          # copy everything except git/workflow/readme meta
          rsync -a --exclude '.git' --exclude '.github' --exclude 'README.md' ./ _site/
          echo "--- site ---"; find _site -type f | sort
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
